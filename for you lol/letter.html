<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dying Rose</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');
gl.getExtension('OES_element_index_uint');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
});

// ── Shaders ───────────────────────────────────────────────────────
const vsSource = `
  attribute vec3 aPos;
  attribute vec3 aNorm;
  attribute vec3 aColor;
  uniform mat4 uMVP;
  uniform mat4 uModel;
  varying vec3 vNorm; varying vec3 vColor; varying vec3 vPos;
  void main() {
    vec4 wp = uModel * vec4(aPos, 1.0);
    vPos  = wp.xyz;
    vNorm = mat3(uModel) * aNorm;
    vColor = aColor;
    gl_Position = uMVP * vec4(aPos, 1.0);
  }`;

const fsSource = `
  precision mediump float;
  varying vec3 vNorm; varying vec3 vColor; varying vec3 vPos;
  uniform vec3 uLight;
  uniform float uAlpha;
  void main() {
    vec3 n = normalize(vNorm);
    vec3 l = normalize(uLight - vPos);
    float diff = max(dot(n, l), 0.0);
    vec3 view = normalize(vec3(0.0, 0.0, 5.0) - vPos);
    vec3 h = normalize(l + view);
    float spec = pow(max(dot(n, h), 0.0), 28.0) * 0.35;
    vec3 col = vColor * (0.18 + diff * 0.75) + vec3(spec);
    gl_FragColor = vec4(col, uAlpha);
  }`;

function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s); return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,   vsSource));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(prog); gl.useProgram(prog);

const aPos   = gl.getAttribLocation(prog, 'aPos');
const aNorm  = gl.getAttribLocation(prog, 'aNorm');
const aColor = gl.getAttribLocation(prog, 'aColor');
const uMVP   = gl.getUniformLocation(prog, 'uMVP');
const uModel = gl.getUniformLocation(prog, 'uModel');
const uLight = gl.getUniformLocation(prog, 'uLight');
const uAlpha = gl.getUniformLocation(prog, 'uAlpha');

// ── Math helpers ──────────────────────────────────────────────────
function mul(a, b) {
  const o = new Float32Array(16);
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      let s = 0; for (let k = 0; k < 4; k++) s += a[r+k*4]*b[k+c*4];
      o[r+c*4] = s;
    }
  return o;
}
function perspective(fov, asp, near, far) {
  const f = 1/Math.tan(fov/2), m = new Float32Array(16);
  m[0]=f/asp; m[5]=f; m[10]=(far+near)/(near-far);
  m[14]=2*far*near/(near-far); m[11]=-1; return m;
}
function translate(x,y,z) {
  const m=new Float32Array(16);
  m[0]=m[5]=m[10]=m[15]=1; m[12]=x; m[13]=y; m[14]=z; return m;
}
function rotY(a) {
  const m=new Float32Array(16), c=Math.cos(a), s=Math.sin(a);
  m[0]=c; m[8]=s; m[2]=-s; m[10]=c; m[5]=m[15]=1; return m;
}
function rotX(a) {
  const m=new Float32Array(16), c=Math.cos(a), s=Math.sin(a);
  m[0]=m[15]=1; m[5]=c; m[9]=-s; m[6]=s; m[10]=c; return m;
}
function rotZ(a) {
  const m=new Float32Array(16), c=Math.cos(a), s=Math.sin(a);
  m[0]=c; m[4]=-s; m[1]=s; m[5]=c; m[10]=m[15]=1; return m;
}
function scale(sx,sy,sz) {
  const m=new Float32Array(16);
  m[0]=sx; m[5]=sy; m[10]=sz; m[15]=1; return m;
}

// ── Geometry builder (returns {pos,norm,col,idx}) ─────────────────
function buildGeometry(fn) {
  const pos=[], norm=[], col=[], idx=[];
  function tri(p0,p1,p2,c,w) {
    const i0=pos.length/3;
    const ax=p1[0]-p0[0],ay=p1[1]-p0[1],az=p1[2]-p0[2];
    const bx=p2[0]-p0[0],by=p2[1]-p0[1],bz=p2[2]-p0[2];
    const nx=ay*bz-az*by, ny=az*bx-ax*bz, nz=ax*by-ay*bx;
    const ln=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
    const r=c[0]*(1-w*0.65), g=c[1]*(1-w*0.75), b=c[2]*(1-w*0.3);
    for (const p of [p0,p1,p2]) {
      pos.push(p[0],p[1],p[2]);
      norm.push(nx/ln,ny/ln,nz/ln);
      col.push(r,g,b);
    }
    idx.push(i0,i0+1,i0+2);
  }
  fn(tri);
  return {pos,norm,col,idx};
}

// ── Single petal geometry (unrotated, layer=outer wilt) ───────────
function petalGeo(layer, totalLayers) {
  const wilt = layer / (totalLayers - 1);
  return buildGeometry(tri => {
    const segs=14, rows=10;
    const petalColor=[0.72,0.06,0.06];
    for (let ri=0;ri<rows;ri++) for (let ci=0;ci<segs;ci++) {
      const t0=ri/rows, t1=(ri+1)/rows;
      const s0=ci/segs-0.5, s1=(ci+1)/segs-0.5;
      function pp(t,s) {
        const w=(0.28+layer*0.12)*Math.sin(t*Math.PI)*(1-Math.abs(s)*1.3);
        const h=t*(0.55+layer*0.18);
        const droop=wilt*t*t*0.55;
        const cup=Math.cos(s*Math.PI*0.9)*0.07*(1-t);
        const crinkle=wilt*Math.sin(s*Math.PI*7)*0.012*t;
        return [s*w*2.2, h-droop+cup+crinkle,
                Math.cos(t*Math.PI*0.5)*(0.08+layer*0.04)+cup];
      }
      const p00=pp(t0,s0),p10=pp(t1,s0),p01=pp(t0,s1),p11=pp(t1,s1);
      tri(p00,p10,p11,petalColor,wilt);
      tri(p00,p11,p01,petalColor,wilt);
    }
  });
}

// ── Rose body (all petals together, static) ───────────────────────
function roseBodyGeo() {
  const totalLayers=6, petalsPerLayer=[5,6,7,8,9,10];
  return buildGeometry(tri => {
    function addPetal(angleY, layer) {
      const wilt=layer/(totalLayers-1);
      const segs=14, rows=10;
      const petalColor=[0.72,0.06,0.06];
      const ca=Math.cos(angleY), sa=Math.sin(angleY);
      function rotPt(p){return[p[0]*ca+p[2]*sa,p[1],-p[0]*sa+p[2]*ca];}
      for (let ri=0;ri<rows;ri++) for (let ci=0;ci<segs;ci++) {
        const t0=ri/rows,t1=(ri+1)/rows,s0=ci/segs-0.5,s1=(ci+1)/segs-0.5;
        function pp(t,s){
          const w=(0.28+layer*0.12)*Math.sin(t*Math.PI)*(1-Math.abs(s)*1.3);
          const droop=wilt*t*t*0.55, cup=Math.cos(s*Math.PI*0.9)*0.07*(1-t);
          const crinkle=wilt*Math.sin(s*Math.PI*7)*0.012*t;
          return[s*w*2.2,t*(0.55+layer*0.18)-droop+cup+crinkle,
                 Math.cos(t*Math.PI*0.5)*(0.08+layer*0.04)+cup];
        }
        const p00=pp(t0,s0),p10=pp(t1,s0),p01=pp(t0,s1),p11=pp(t1,s1);
        tri(rotPt(p00),rotPt(p10),rotPt(p11),petalColor,wilt);
        tri(rotPt(p00),rotPt(p11),rotPt(p01),petalColor,wilt);
      }
    }
    for (let layer=0;layer<totalLayers;layer++) {
      const pCount=petalsPerLayer[layer];
      for (let p=0;p<pCount;p++)
        addPetal((p/pCount)*Math.PI*2+layer*0.37, layer);
    }
    // stem
    const sc=[0.12,0.28,0.08], segs=16, ht=1.2, r0=0.028,r1=0.018;
    for (let i=0;i<segs;i++) {
      const a0=(i/segs)*Math.PI*2, a1=((i+1)/segs)*Math.PI*2, cv=0.12;
      tri([Math.cos(a0)*r0,-0.05,Math.sin(a0)*r0],
          [Math.cos(a0)*r1+cv,-0.05-ht,Math.sin(a0)*r1],
          [Math.cos(a1)*r1+cv,-0.05-ht,Math.sin(a1)*r1],sc,0.3);
      tri([Math.cos(a0)*r0,-0.05,Math.sin(a0)*r0],
          [Math.cos(a1)*r1+cv,-0.05-ht,Math.sin(a1)*r1],
          [Math.cos(a1)*r0,-0.05,Math.sin(a1)*r0],sc,0.3);
    }
    // leaves
    function leaf(posY, posX) {
      const lc=[0.10,0.25,0.07], segs=10, rows=8;
      for (let ri=0;ri<rows;ri++) for (let ci=0;ci<segs;ci++) {
        const t0=ri/rows,t1=(ri+1)/rows,s0=ci/segs-0.5,s1=(ci+1)/segs-0.5;
        function lp(t,s){const w=0.18*Math.sin(t*Math.PI)*(1-Math.abs(s)*1.5);
          return[posX+s*w*2+t*0.12,posY-t*0.35-0.6*t*t*0.3,t*0.05];}
        tri(lp(t0,s0),lp(t1,s0),lp(t1,s1),lc,0.6);
        tri(lp(t0,s0),lp(t1,s1),lp(t0,s1),lc,0.6);
      }
    }
    leaf(-0.45,0.04); leaf(-0.75,0.06);
  });
}

// ── Upload geometry to GPU ────────────────────────────────────────
function uploadGeo(geo) {
  const pb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,pb);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(geo.pos),gl.STATIC_DRAW);
  const nb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,nb);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(geo.norm),gl.STATIC_DRAW);
  const cb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,cb);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(geo.col),gl.STATIC_DRAW);
  const ib=gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint32Array(geo.idx),gl.STATIC_DRAW);
  return {pb,nb,cb,ib,count:geo.idx.length};
}

function bindAndDraw(buf) {
  gl.bindBuffer(gl.ARRAY_BUFFER,buf.pb);
  gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf.nb);
  gl.enableVertexAttribArray(aNorm); gl.vertexAttribPointer(aNorm,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf.cb);
  gl.enableVertexAttribArray(aColor); gl.vertexAttribPointer(aColor,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,buf.ib);
  gl.drawElements(gl.TRIANGLES,buf.count,gl.UNSIGNED_INT,0);
}

// Build & upload rose body + one petal per outer layer
const roseBuf = uploadGeo(roseBodyGeo());

// Petal templates for falling petals (outer 3 layers look different)
const petalBufs = [4,5].map(l => uploadGeo(petalGeo(l, 6)));

// ── Falling petal particles ───────────────────────────────────────
const MAX_PETALS = 28;
const fallingPetals = [];

function spawnPetal() {
  const angle = Math.random() * Math.PI * 2;
  const radius = 0.1 + Math.random() * 0.35;
  const bufIdx = Math.floor(Math.random() * petalBufs.length);
  fallingPetals.push({
    // world position (relative to rose center)
    x: Math.cos(angle) * radius,
    y: 0.4 + Math.random() * 0.6,   // start near bloom
    z: Math.sin(angle) * radius,
    // velocity
    vx: (Math.random() - 0.5) * 0.004,
    vy: -(0.004 + Math.random() * 0.006),
    vz: (Math.random() - 0.5) * 0.003,
    // tumble
    rx: Math.random() * Math.PI * 2,
    ry: Math.random() * Math.PI * 2,
    rz: Math.random() * Math.PI * 2,
    vrx: (Math.random() - 0.5) * 0.06,
    vry: (Math.random() - 0.5) * 0.08,
    vrz: (Math.random() - 0.5) * 0.05,
    // visuals
    bufIdx,
    alpha: 1.0,
    scale: 0.55 + Math.random() * 0.35,
    life: 1.0,
  });
}

// ── Render setup ──────────────────────────────────────────────────
gl.enable(gl.DEPTH_TEST);
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

const proj = perspective(Math.PI / 4, canvas.width / canvas.height, 0.1, 100);
const view = translate(0, 0.1, -2.9);

let t = 0;
let nextSpawn = 0;
const SPAWN_INTERVAL = 55; // frames between new petals

function render() {
  requestAnimationFrame(render);
  t++;

  // Spawn
  if (t > nextSpawn && fallingPetals.length < MAX_PETALS) {
    spawnPetal();
    nextSpawn = t + SPAWN_INTERVAL + Math.floor(Math.random() * 30);
  }

  // Update petals
  for (let i = fallingPetals.length - 1; i >= 0; i--) {
    const p = fallingPetals[i];
    p.x += p.vx;
    p.y += p.vy;
    p.z += p.vz;
    // gentle air drift
    p.vx += (Math.random() - 0.5) * 0.0003;
    p.vz += (Math.random() - 0.5) * 0.0003;
    p.rx += p.vrx; p.ry += p.vry; p.rz += p.vrz;
    // slow tumble over time
    p.vrx *= 0.998; p.vry *= 0.998; p.vrz *= 0.998;
    // fade out near bottom
    if (p.y < -1.4) p.alpha -= 0.018;
    if (p.alpha <= 0) fallingPetals.splice(i, 1);
  }

  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  const roseAngle = t * 0.008;
  const roseModel = mul(rotX(-0.18), rotY(roseAngle));
  const roseMVP   = mul(proj, mul(view, roseModel));

  // Draw rose body
  gl.uniform1f(uAlpha, 1.0);
  gl.uniformMatrix4fv(uMVP,   false, roseMVP);
  gl.uniformMatrix4fv(uModel, false, roseModel);
  gl.uniform3f(uLight, 1.5, 2.5, 3.0);
  bindAndDraw(roseBuf);

  // Draw falling petals
  for (const p of fallingPetals) {
    // Petal transform: tumble + position, independent of rose rotation
    const petalModel = mul(
      translate(p.x, p.y, p.z),
      mul(rotY(p.ry), mul(rotX(p.rx), mul(rotZ(p.rz), scale(p.scale, p.scale, p.scale))))
    );
    const petalMVP = mul(proj, mul(view, petalModel));

    gl.uniform1f(uAlpha, Math.max(0, p.alpha));
    gl.uniformMatrix4fv(uMVP,   false, petalMVP);
    gl.uniformMatrix4fv(uModel, false, petalModel);
    bindAndDraw(petalBufs[p.bufIdx]);
  }
}

// Kick off initial burst of petals
for (let i = 0; i < 6; i++) { spawnPetal(); }
nextSpawn = SPAWN_INTERVAL;

render();
</script>
</body>
</html>
